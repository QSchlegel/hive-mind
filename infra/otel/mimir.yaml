multitenancy_enabled: false

server:
  http_listen_port: 9009

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /tmp/mimir/blocks

compactor:
  data_dir: /tmp/mimir/compactor

ingester:
  ring:
    replication_factor: 1

ruler:
  rule_path: /tmp/mimir/rules

store_gateway:
  sharding_ring:
    replication_factor: 1
