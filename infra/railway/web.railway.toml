[build]
builder = "NIXPACKS"
watchPatterns = ["apps/web/**", "packages/**", "package.json", "package-lock.json", "tsconfig.base.json"]

[deploy]
startCommand = "npm run start --workspace @hive-mind/web"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/api/graph"
healthcheckTimeout = 120
